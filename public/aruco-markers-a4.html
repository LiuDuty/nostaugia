<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ArUcos A4</title>
<style>
@page{size:A4;margin:10mm}
*{box-sizing:border-box}
body{margin:0;background:#fff;color:#111;font-family:Arial,sans-serif}
.page{width:190mm;min-height:277mm;page-break-after:always;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(5,1fr);gap:7mm;padding:0}
.card{border:0.25mm dashed #aaa;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3mm;padding:4mm;break-inside:avoid}
.marker{width:8.5mm;height:8.5mm;background:#fff}
.marker svg{width:8.5mm!important;height:8.5mm!important;display:block}
.label{font:bold 9pt Arial,sans-serif;line-height:1;text-align:center}
.sub{font:7pt Arial,sans-serif;color:#555;text-align:center}
</style>
</head>
<body>
<div id="pages"></div>
<script src="https://cdn.jsdelivr.net/npm/js-aruco2/src/cv.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-aruco2/src/aruco.js"></script>
<script>
const pages=document.getElementById('pages');
const dict=new AR.Dictionary('ARUCO');
for(let page=0;page<2;page++){
  const p=document.createElement('section');p.className='page';
  for(let i=page*20;i<Math.min(40,(page+1)*20);i++){
    const card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="marker">'+dict.generateSVG(i)+'</div><div class="label">Peça '+(i+1)+' / A'+i+'</div><div class="sub">Recorte e cole na peça '+(i+1)+'</div>';
    p.appendChild(card);
  }
  pages.appendChild(p);
}
</script>
</body>
</html>
